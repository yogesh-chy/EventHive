# Phase 5: Nginx rate limiting + WebSocket proxying.
#
# No docker-compose.yml exists in this repo to wire this into automatically
# -- this file documents the intended production topology and is meant to
# be mounted into an nginx container/service pointing at two upstreams:
#
#   gunicorn (WSGI, config.wsgi:application) -- regular HTTP/API traffic.
#   daphne   (ASGI, config.asgi:application) -- /ws/ traffic only.
#
# Why split traffic instead of sending everything through daphne (which,
# via config/asgi.py's ProtocolTypeRouter, is technically capable of
# serving both protocols from one process): this app is overwhelmingly
# synchronous Django views on top of a synchronous ORM. Gunicorn's sync
# worker model is the better fit for that traffic shape; daphne is reserved
# for the long-lived WebSocket connections (SeatConsumer) it actually
# exists for. Mixing them gives WebSocket connections in production their
# own process pool instead of competing with API request workers for the
# same event loop.

# ---- Rate limiting zones ----
# Keyed by client IP, in shared memory so it works correctly across
# multiple Nginx worker processes (not per-worker, which would let an
# attacker get N-times the limit by chance of which worker handles each
# connection).

# General API traffic: generous, this is a second line of defense behind
# DRF's own per-user/per-scope throttling (settings.REST_FRAMEWORK
# DEFAULT_THROTTLE_RATES) -- Nginx's job here is to stop a connection flood
# from ever reaching a Gunicorn worker, not to enforce exact business
# limits. 20 req/s sustained with burst=40 absorbs a legitimate burst
# (e.g. a page loading several API calls at once) without passing through
# anything resembling a flood.
limit_req_zone $binary_remote_addr zone=api_general:10m rate=20r/s;

# Auth endpoints (login, register, password reset): tighter, matching the
# sensitivity of credential-stuffing / brute-force targets. This is
# intentionally close to DRF's "auth": "10/minute" rate (settings.py) --
# unlike the general zone, these two limits are meant to agree, so a
# blocked request fails fast at Nginx instead of round-tripping into
# Django only to be throttled there anyway.
limit_req_zone $binary_remote_addr zone=api_auth:10m rate=10r/m;

# Stripe webhook: deliberately NOT in either zone above. Stripe retries
# failed webhook deliveries on a schedule outside this app's control, and
# a single misconfigured rate limit here can cause Stripe to back off
# delivering a payment confirmation -- the one endpoint in this whole
# system where "too strict" has a direct revenue/customer-trust cost.
# Connection-level protections (below) still apply.

# ---- Upstreams ----
upstream eventhive_gunicorn {
    server web:8000;          # matches a docker-compose service named "web" running gunicorn -- adjust if yours differs
    keepalive 32;
}

upstream eventhive_daphne {
    server websocket:8001;    # a separate service running `daphne -b 0.0.0.0 -p 8001 config.asgi:application`
}

server {
    listen 80;
    server_name _;

    client_max_body_size 10M;  # ticket PDF / event banner uploads go through S3 presigned URLs, not through this app, so this stays small

    # ---- WebSocket traffic: SeatConsumer ----
    location /ws/ {
        proxy_pass http://eventhive_daphne;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # WebSocket connections are long-lived by nature -- the default
        # 60s proxy_read_timeout would silently kill an idle-but-still-
        # connected client (someone watching a seat counter with no new
        # purchases happening) well before they'd expect a disconnect.
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    # ---- Stripe webhook: no rate limiting, see comment above ----
    location /api/v1/orders/webhook/ {
        proxy_pass http://eventhive_gunicorn;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Adjust this path if your actual webhook URL (apps/orders/urls.py) differs.
    }

    # ---- Auth endpoints: tight limit ----
    location ~ ^/api/v1/(auth|users)/ {
        limit_req zone=api_auth burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://eventhive_gunicorn;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Adjust this regex to match your actual apps.users URL prefix if different.
    }

    # ---- Everything else: general API limit ----
    location /api/ {
        limit_req zone=api_general burst=40 nodelay;
        limit_req_status 429;

        proxy_pass http://eventhive_gunicorn;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ---- Django Admin: not behind the API rate-limit zone, but still
    # capped -- this should realistically sit behind a VPN/IP allowlist in
    # production; the limit here is a floor, not a substitute for that. ----
    location /admin/ {
        limit_req zone=api_general burst=20 nodelay;
        proxy_pass http://eventhive_gunicorn;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
